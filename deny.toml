# cargo-deny configuration — Configra
# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Docs: https://embarkstudios.github.io/cargo-deny/
# Run:  just deny

# ─── Bans: catch workspace anti-patterns ────────────────────────────────────
[bans]
multiple-versions          = "warn"
workspace-default-features = "allow"
wildcards                  = "deny"
skip                       = [
    { name = "windows-sys",     version = ">=0.52" },
    { name = "windows-targets", version = ">=0.52" },
]

# ─── Licenses: allow-list ────────────────────────────────────────────────────
[licenses]
version    = 2
allow      = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "CC0-1.0",
    "CC-BY-SA-4.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
    "CDLA-Permissive-1.0",
    "Unlicense",
    "WTFPL",
    "OpenSSL",
    "NTP",
]
confidence-threshold = 0.8

# ─── Sources: only crates.io ─────────────────────────────────────────────────
[sources]
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
unknown-git      = "deny"
unknown-registry = "deny"

# ─── Advisories: fail on any known vulnerability ────────────────────────────
[advisories]
version = 2
yanked  = "warn"
ignore  = []
# Database: https://github.com/rustsec/advisory-db
