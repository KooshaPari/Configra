apiVersion: phenotype.governance/v1
kind: CIRequiredJobs
metadata:
  name: phenotype-ci-required-jobs
spec:
  tiers: [T0, T1, T2, T3, T4]
  tier_requirements:
    T0:
      jobs: [format, lint, policy-gate]
    T1:
      jobs: [format, lint, policy-gate, unit, secrets, dep-audit]
    T2:
      jobs: [format, lint, policy-gate, unit, integration, sast, secrets, coverage]
    T3:
      jobs: [format, lint, policy-gate, unit, integration, sast, secrets, coverage, e2e, perf, sla-validation, sbom]
    T4:
      jobs: [format, lint, policy-gate, unit, integration, sast, secrets, coverage, e2e, perf, sla-validation, sbom, artifact-checksum, manual-security]
  stage_min_tier:
    SP: T0
    POC: T0
    IP: T1
    A: T2
    FP: T2
    B: T2
    EP: T3
    CN: T3
    RC: T3
    GA: T3
    PROD: T4
    LTS: T3
    HF: T1
    SS: T2
    DEP: T2
    AR: T1
    EOL: T0
  semantic_jobs:
    - docs-semantic-check
    - eval-traceability-check
    - governance-drift-check
  semantic_required_from_stage:
    - FP
    - B
    - EP
    - CN
    - RC
    - GA
    - PROD
    - LTS
    - SS
    - DEP
  global_rules:
    all_required_jobs_must_pass: true
    allow_neutral: false
    max_job_age_hours: 24
    strict_mode_required_stages: [RC, GA, PROD, LTS]
