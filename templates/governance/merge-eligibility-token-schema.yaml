version: 1
schema_id: phenotype.governance.merge_eligibility_token
description: Schema for merge eligibility attestations generated by policy-gate resolver flows.
type: object
required:
  - schema_id
  - version
  - token_id
  - repo
  - head_sha
  - head_branch
  - base_branch
  - source_stage
  - target_stage
  - destination_scope
  - strict
  - required_jobs
  - completed_jobs
  - failed_jobs
  - traceability
  - attestations
  - eligible
  - generated_at
properties:
  schema_id:
    type: string
    const: phenotype.governance.merge_eligibility_token
  version:
    type: integer
    minimum: 1
  token_id:
    type: string
  repo:
    type: string
  head_sha:
    type: string
  head_branch:
    type: string
  base_branch:
    type: string
  source_stage:
    type: string
    enum: [SP, POC, IP, A, FP, B, EP, CN, RC, GA, PROD, LTS, SS, DEP, AR, EOL, HF]
  target_stage:
    type: string
    enum: [SP, POC, IP, A, FP, B, EP, CN, RC, GA, PROD, LTS, SS, DEP, AR, EOL, HF]
  destination_scope:
    type: string
    enum: [module, trunk]
  strict:
    type: boolean
  required_jobs:
    type: array
    items:
      type: string
  completed_jobs:
    type: array
    items:
      type: string
  failed_jobs:
    type: array
    items:
      type: string
  traceability:
    type: object
    required: [pr_number, docs_refs, eval_refs, policy_refs]
    properties:
      pr_number:
        type: integer
      docs_refs:
        type: array
        items:
          type: string
      eval_refs:
        type: array
        items:
          type: string
      policy_refs:
        type: array
        items:
          type: string
  attestations:
    type: object
    required: [ci_verified, reviews_verified, policy_verified]
    properties:
      ci_verified:
        type: boolean
      reviews_verified:
        type: boolean
      policy_verified:
        type: boolean
  policy_digest:
    type: string
  generated_at:
    type: string
    format: date-time
additionalProperties: false
