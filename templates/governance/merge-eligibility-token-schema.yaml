apiVersion: phenotype.governance/v1
kind: MergeEligibilityTokenSchema
metadata:
  name: phenotype-merge-eligibility
spec:
  token:
    format: jwt
    issuer: ci.phenotype.internal
    audience: scm.merge-gateway
    required_claims:
      - pr_number
      - repo
      - head_sha
      - source_branch
      - source_stage
      - destination_scope
      - destination_branch
      - destination_stage
      - tier
      - checks_passed
      - traceability
      - attestations
      - issued_at
      - expires_at
    claim_types:
      pr_number: integer
      repo: string
      head_sha: string
      source_branch: string
      source_stage:
        type: string
        enum: [SP, POC, IP, A, FP, B, EP, CN, RC, GA, PROD, LTS, HF, SS, DEP, AR, EOL]
      destination_scope:
        type: string
        enum: [module, trunk]
      destination_branch: string
      destination_stage:
        type: string
        enum: [SP, POC, IP, A, FP, B, EP, CN, RC, GA, PROD, LTS, HF, SS, DEP, AR, EOL]
      tier:
        type: string
        enum: [T0, T1, T2, T3, T4]
      checks_passed:
        type: array
        items: string
      traceability:
        type: object
        required: [ADR, PRD, PLAN, TEST, EVAL, DOC, GOV]
      attestations:
        type: array
        items:
          type: object
          required: [type, subject_sha, verifier, verified_at]
          properties:
            type:
              enum: [build-provenance, sbom, security-scan, deploy-attestation]
            subject_sha: string
            verifier: string
            verified_at: string
      issued_at: string
      expires_at: string
  merge_rules:
    require_signature: true
    key_set_ref: kms://phenotype/merge-eligibility-jwks
    subject_sha_must_match_pr_head: true
    checks_passed_must_match_required_jobs: true
    transition_must_match_matrix: true
    destination_scope_allowed:
      module:
        branch_pattern: "^module/.+/.+$"
      trunk:
        branch_pattern: "^trunk/.+$"
  attestation_requirements_by_stage:
    SP: []
    POC: []
    IP: [build-provenance]
    A: [build-provenance]
    FP: [build-provenance]
    B: [build-provenance, security-scan]
    EP: [build-provenance, security-scan]
    CN: [build-provenance, security-scan, sbom]
    RC: [build-provenance, security-scan, sbom]
    GA: [build-provenance, security-scan, sbom, deploy-attestation]
    PROD: [build-provenance, security-scan, sbom, deploy-attestation]
    LTS: [build-provenance, sbom]
    HF: [build-provenance, security-scan]
    SS: [build-provenance]
    DEP: [build-provenance]
    AR: []
    EOL: []
  max_token_age_minutes_by_stage:
    SP: 240
    POC: 240
    IP: 180
    A: 120
    FP: 120
    B: 90
    EP: 90
    CN: 60
    RC: 60
    GA: 45
    PROD: 30
    LTS: 60
    HF: 45
    SS: 120
    DEP: 120
    AR: 240
    EOL: 240
