extends: existence
message: "Forbidden governance phrase '%s'. Replace with enforceable policy language."
level: error
ignorecase: true
tokens:
  - '\bforce\s+merge\b'
  - '\bskip(ping)?\s+checks\b'
  - '\bbypass\s+(the\s+)?(gate|gates|policy|policies)\b'
  - '\brubber\s+stamp\b'
  - '\blgtm\b'
  - '\bship\s+it\s+anyway\b'
