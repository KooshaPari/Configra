# Configra — Release workflow
# SPDX-License-Identifier: MIT OR Apache-2.0

name: Release

on:
  push:
    tags: ["v*"]

jobs:
  # ─── Publish to crates.io ──────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WORKSPACE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml)"
          if [ "$TAG_VERSION" != "$WORKSPACE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match workspace version ($WORKSPACE_VERSION)"
            exit 1
          fi

      - name: Publish config-schema
        run: cargo publish -p config-schema
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish pheno-config
        run: cargo publish -p pheno-config
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish settly
        run: cargo publish -p settly
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ─── GitHub Release ────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: release_notes
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: {{URL}}",
              "categories": [
                {"title": "## 🚀 Features", "labels": ["feat"]},
                {"title": "## 🐛 Bug Fixes", "labels": ["fix"]},
                {"title": "## 📚 Documentation", "labels": ["docs"]},
                {"title": "## 🧹 Chores", "labels": ["chore"]}
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.changelog }}
          generate_release_notes: false
