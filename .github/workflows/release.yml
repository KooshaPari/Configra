name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      crate:
        description: 'Specific crate to publish (empty = all publishable)'
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          CRATE: ${{ inputs.crate }}
        run: |
          if [ -n "$CRATE" ]; then
            cargo publish -p "$CRATE" --no-verify
          else
            for name in $(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | .name' | tac); do
              if cargo metadata --format-version=1 --no-deps | jq -e --arg name "$name" '.packages[] | select(.name == $name) | select(.publish != false and .publish != [])' > /dev/null; then
                echo "Publishing $name"
                cargo publish -p "$name" --no-verify
              fi
            done
          fi
