name: sbom

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes and reduce
# pressure on the hosted-runner pool.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default job timeout of 360 min matches GitHub's hosted-runner cap, but
# we also set an explicit 30-min cap on the SBOM job so a runner that
# is failing to provision does not block the workflow.
jobs:
  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --override-filename sbom.json
      - name: Reject GPL/AGPL additions
        run: |
          if jq -r '.components[].licenses[]?.license.id' sbom.json | grep -E 'GPL|AGPL'; then
            echo "GPL/AGPL license detected — failing per fleet policy."
            exit 1
          fi
      - uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
