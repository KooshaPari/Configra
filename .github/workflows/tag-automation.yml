name: Tag Automation
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Delegates to phenoShared reusable workflow.
# See: https://github.com/KooshaPari/phenoShared/blob/main/.github/workflows/reusable/tag-automation.yml

on:
  push:
    tags:
      - 'v*'

jobs:
  tag:
    uses: KooshaPari/phenoShared/.github/workflows/tag-automation.yml@136def14b63e59da150eae1dc525677746098dd0
    permissions:
      contents: write
