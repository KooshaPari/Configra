name: Deploy docs
on:
  push:
  timeout-minutes: 30
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    uses: KooshaPari/phenoShared/.github/workflows/vitepress-pages.yml@136def14b63e59da150eae1dc525677746098dd0
    with:
      concurrency_group: pages-configra
      docs_dir: docs
