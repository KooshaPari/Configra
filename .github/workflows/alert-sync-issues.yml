name: Alert sync issues
on:
  schedule:
  timeout-minutes: 10
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write
  security-events: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
  sync:
    uses: KooshaPari/phenoShared/.github/workflows/alert-sync-issues.yml@main
    with:
      auto-label: auto-alert-sync
